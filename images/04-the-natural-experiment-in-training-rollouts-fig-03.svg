<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">First-stage F versus actual size of a nominal five-percent t-test</title>
  <desc>A descending curve relating first-stage F (1 to 200) to the true size of a nominal 5% t-test. The curve sits well above 5% at the legacy F=10 threshold and only meets the 5% reference line near F=104.7. Two vertical guides mark F=10 (the wrong threshold) and F=104.7 (the real one).</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Pharma Rep Visit Data as an Untapped Causal Dataset" book-slug="pharma-rep-visit-data-as-an-untapped-causal-dataset" chapter="04-the-natural-experiment-in-training-rollouts" figure-number="02" figure-title="First-stage F vs actual test size (the F>10 myth)" figure-slug="first-stage-f-vs-test-size" figure-type="line chart" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/04-the-natural-experiment-in-training-rollouts.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
