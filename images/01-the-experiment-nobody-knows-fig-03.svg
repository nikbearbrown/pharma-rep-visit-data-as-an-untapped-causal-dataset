  <title id="fig-title-03">The unrun experiment - cohort rollout creates a quasi-random message checkerboard</title>
  <desc>Training cohorts on the vertical axis and quarters across the horizontal axis form a grid. Each cell is shaded for the old efficacy-first deck or the new safety-first deck. The staggered certification dates make a checkerboard: which physician heard which message when was set by training logistics, not by physician choice.</desc>
