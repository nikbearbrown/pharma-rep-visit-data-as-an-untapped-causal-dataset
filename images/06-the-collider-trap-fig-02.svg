  <line x1="100" y1="240" x2="150" y2="290" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="186" y1="148" x2="186" y2="284" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="214" y1="140" x2="278" y2="196" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== RIGHT PANEL: conditioned, path opened. x in [370,660] ====== -->
  <text x="516" y="78" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E" text-anchor="middle" font-weight="bold">WITH conditioning -- path opened</text>

  <ellipse cx="516" cy="120" rx="50" ry="28" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5" stroke-dasharray="5 4"/>
