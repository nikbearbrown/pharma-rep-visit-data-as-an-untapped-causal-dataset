  <text x="516" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">openness</text>

  <rect x="378" y="200" width="76" height="40" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="416" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">message</text>
  <rect x="578" y="200" width="76" height="40" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="616" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">NRx</text>
  <!-- engagement with conditioning box (red) -->
  <rect x="478" y="288" width="76" height="40" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="470" y="280" width="92" height="56" fill="none" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="516" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">dwell /</text>
  <text x="516" y="320" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">reaction</text>

  <!-- same true edges -->
  <line x1="454" y1="216" x2="574" y2="216" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="430" y1="240" x2="480" y2="290" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="516" y1="148" x2="516" y2="284" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="544" y1="140" x2="608" y2="196" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- spurious dashed path: message -> through openness -> NRx (red), only on right -->
  <path d="M 426 200 Q 466 150 480 132" fill="none" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <path d="M 552 132 Q 580 156 606 198" fill="none" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowred)"/>
  <rect x="434" y="170" width="78" height="15" fill="#FFFFFF"/>
  <text x="510" y="181" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" text-anchor="end">spurious path</text>

  <!-- panel separator -->
  <line x1="350" y1="64" x2="350" y2="344" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- legend: dashed = unobserved / induced -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">
    <ellipse cx="46" cy="360" rx="10" ry="6" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="62" y="364">dashed node = unobserved (latent)</text>
    <line x1="330" y1="360" x2="356" y2="360" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="362" y="364">red dashed = spurious path induced by conditioning</text>
  </g>

  <!-- caption: honesty -->
  <text x="32" y="388" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Dwell and reaction are POST-TREATMENT colliders, not confounders. Adding them to the model does not control bias -- it creates it,</text>
  <text x="32" y="404" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">linking message to NRx through unobserved openness. Veeva field names dated mid-2026; kept out of the figure. Public + synthetic only.</text>
