<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">Conditioning on in-visit engagement opens a spurious message-to-NRx path</title>
  <desc>Two identical four-node graphs. Message and NRx sit left and right; latent physician openness above center (dashed outline, unobserved); in-visit engagement (dwell/reaction) below center is a common effect of message and openness -- a collider. Left graph: engagement untouched, the path through openness stays blocked. Right graph: a box conditions on engagement and a dashed spurious path links message to NRx through openness.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Pharma Rep Visit Data as an Untapped Causal Dataset" book-slug="pharma-rep-visit-data-as-an-untapped-causal-dataset" chapter="06-the-collider-trap" figure-number="02" figure-title="Dwell/reaction collider: path closed vs path opened" figure-slug="dwell-reaction-collider-two-state" figure-type="two-state DAG" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/06-the-collider-trap.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
    <marker id="arrowred" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#C8102E"/></marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The path was closed before she touched it</text>
  <text x="32" y="50" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Same four nodes. The only change is conditioning on engagement (right).</text>

  <!-- ====== LEFT PANEL: unconditioned, path blocked. x in [40,330] ====== -->
  <text x="186" y="78" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">WITHOUT conditioning -- path blocked</text>

  <!-- latent openness (dashed circle, unobserved) top center -->
  <ellipse cx="186" cy="120" rx="50" ry="28" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="186" y="118" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">physician</text>
  <text x="186" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">openness</text>

  <!-- Message left -->
  <rect x="48" y="200" width="76" height="40" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="86" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">message</text>
  <!-- NRx right -->
  <rect x="248" y="200" width="76" height="40" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="286" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">NRx</text>
  <!-- engagement collider lower center -->
  <rect x="148" y="288" width="76" height="40" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="186" y="306" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">dwell /</text>
  <text x="186" y="320" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">reaction</text>

  <!-- edges: message->NRx (direct), message->engagement, openness->engagement, openness->NRx -->
