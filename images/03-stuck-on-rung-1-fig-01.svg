<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">Pearl's Ladder of Causation, three sealed rungs</title>
  <desc>A three-rung ladder: association (seeing) at bottom, intervention (doing) middle, counterfactual (imagining) top, each strictly more powerful. A sealing band between rung 1 and rung 2 marks that Rung-1 data alone cannot reach the rung above. One pharma example per rung.</desc>
