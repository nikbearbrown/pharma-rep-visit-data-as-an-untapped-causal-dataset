  <line x1="456" y1="254" x2="664" y2="254" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="5 4"/>
  <line x1="456" y1="286" x2="664" y2="286" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="5 4"/>
  <line x1="456" y1="318" x2="664" y2="318" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="5 4"/>
  <text x="560" y="248" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">lower deciles: Sure Things, Lost Causes</text>
  <text x="456" y="362" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">top decile gets 84% of budget</text>
  <text x="456" y="378" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">and causes ~61% of increment</text>

  <!-- overlap band between the two top deciles -->
  <line x1="304" y1="116" x2="456" y2="116" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="456" y1="116" x2="304" y2="116" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="380" y="108" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">top-decile overlap: low</text>

  <!-- Caption / honesty caveat -->
  <text x="32" y="412" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Same 200 physicians, same budget. The NBA list ranks sure-things (waste); the Living Model ranks persuadables. That the two</text>
  <text x="32" y="426" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">lists differ SYSTEMATICALLY is a TESTABLE hypothesis (held-out Qini comparison), not a settled fact (Ascarza 2018). Budget</text>
  <text x="32" y="440" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">and increment shares are illustrative [inferred]; only the direction of the contrast is claimed.</text>
  <text x="32" y="462" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: CH.12 FROM PROPENSITY TO PERSUADABLES</text>
