  <line x1="80" y1="160" x2="660" y2="160" stroke="#787878" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="656" y="154" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">planted truth</text>

  <!-- Correct DML: on truth, wider whisker. x=260 -->
  <line x1="260" y1="124" x2="260" y2="196" stroke="#2a1a0e" stroke-width="1.5"/>
