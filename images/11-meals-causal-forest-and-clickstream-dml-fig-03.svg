  <rect x="80" y="64" width="580" height="256" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- zero baseline -->
  <line x1="80" y1="320" x2="660" y2="320" stroke="#2a1a0e" stroke-width="1"/>
  <text x="74" y="324" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">0</text>
  <text x="36" y="192" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 36 192)" text-anchor="middle">sequence effect</text>

