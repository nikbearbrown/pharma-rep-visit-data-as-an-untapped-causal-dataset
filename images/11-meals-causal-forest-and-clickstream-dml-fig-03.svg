  <!-- Caption / honesty caveat -->
  <text x="32" y="354" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The contaminated estimate's tighter whisker is the trap: a confident-looking interval that excludes the truth. Specify the</text>
  <text x="32" y="369" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">SCM first so reaction and dwell (post-treatment colliders) never enter Z. Magnitudes [inferred]; synthetic "to be generated" -</text>
  <text x="32" y="384" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">only relative displacement and relative whisker width are claimed. Project 3 needs proprietary or synthetic data (the firewall).</text>
  <text x="32" y="408" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: ILLUSTRATIVE ESTIMATE COMPARISON AS DESCRIBED IN CHAPTER 11</text>
