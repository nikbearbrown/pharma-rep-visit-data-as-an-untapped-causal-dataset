<svg viewBox="0 0 700 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">Collider-contaminated DML: a tight interval around the wrong number</title>
  <desc>An estimate-comparison chart against a known planted ground-truth level shown as a gray horizontal reference line. The correctly specified DML, using pre-treatment controls only, sits on the truth line with an honest, moderately wide confidence whisker that overlaps it. The collider-contaminated DML is displaced clearly off the truth line and carries a deceptively narrower whisker that does not overlap the truth. The vertical effect axis is anchored at a visible zero. Magnitudes are inferred; only relative displacement and whisker width are meaningful.</desc>
