  <line x1="480" y1="232" x2="480" y2="264" stroke="#C8102E" stroke-width="1.5"/>
  <line x1="468" y1="232" x2="492" y2="232" stroke="#C8102E" stroke-width="1.5"/>
  <line x1="468" y1="264" x2="492" y2="264" stroke="#C8102E" stroke-width="1.5"/>
