<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">Two-plane CLM schema converging via NPI into the physician-time panel</title>
  <desc>Two source planes (passive telemetry, rep-entered) plus a warehouse box route through a mandatory consent gate and a shared NPI key into one physician-time panel. Consent is a single mandatory gate, not an optional side box.</desc>
