<svg viewBox="0 0 700 420" role="img" aria-labelledby="fig-title-02" xmlns="http://www.w3.org/2000/svg">
  <title id="fig-title-02">The three-rung interview ladder: association, intervention, counterfactual</title>
  <desc>A vertical ladder of three rungs ascending bottom to top. The bottom rung is association, the middle is intervention, the top is counterfactual. Each rung has three slots: question type, what the system extracts, and the causal role it plays. A red arrow on the left shows the climb of deepening causal commitment; two feed-forward arrows on the right show each rung's output framing the rung above it.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Pharma Rep Visit Data as an Untapped Causal Dataset" book-slug="pharma-rep-visit-data-as-an-untapped-causal-dataset" chapter="08-the-causal-interview-bot" figure-number="02" figure-title="The three-rung question ladder" figure-slug="three-rung-question-ladder" figure-type="Process flowchart" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/08-the-causal-interview-bot.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
