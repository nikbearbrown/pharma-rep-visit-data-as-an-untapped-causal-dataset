  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- title -->
  <text x="32" y="34" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The interview climbs Pearl's ladder: each rung frames the next</text>

  <!-- column headers -->
  <text x="200" y="60" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">QUESTION TYPE</text>
  <text x="370" y="60" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">SYSTEM EXTRACTS</text>
  <text x="552" y="60" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">CAUSAL ROLE</text>

  <!-- climb arrow on the left (bottom to top, red) -->
  <line x1="48" y1="280" x2="48" y2="76" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="40" y="180" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" transform="rotate(-90 40 180)">deepening causal commitment</text>

  <!-- RUNG 1 (bottom) ASSOCIATION  y 232..280 -->
  <rect x="116" y="232" width="168" height="48" fill="#F5F5F5" stroke="#ADADAD" stroke-width="1"/>
  <rect x="286" y="232" width="168" height="48" fill="#F5F5F5" stroke="#ADADAD" stroke-width="1"/>
  <rect x="468" y="232" width="168" height="48" fill="#F5F5F5" stroke="#ADADAD" stroke-width="1"/>
  <text x="200" y="252" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">RUNG 1 - ASSOCIATION</text>
  <text x="200" y="270" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">open narration</text>
  <text x="370" y="261" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">candidate confounders</text>
  <text x="552" y="261" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">what to adjust for</text>

  <!-- RUNG 2 (middle) INTERVENTION  y 158..206 -->
  <rect x="116" y="158" width="168" height="48" fill="#F5F5F5" stroke="#787878" stroke-width="1"/>
  <rect x="286" y="158" width="168" height="48" fill="#F5F5F5" stroke="#787878" stroke-width="1"/>
  <rect x="468" y="158" width="168" height="48" fill="#F5F5F5" stroke="#787878" stroke-width="1"/>
  <text x="200" y="178" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">RUNG 2 - INTERVENTION</text>
  <text x="200" y="196" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">mental experiment</text>
  <text x="370" y="187" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">susceptibility indices</text>
  <text x="552" y="187" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">effect heterogeneity</text>

  <!-- RUNG 3 (top) COUNTERFACTUAL  y 84..132 -->
  <rect x="116" y="84" width="168" height="48" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="286" y="84" width="168" height="48" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="468" y="84" width="168" height="48" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="200" y="104" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">RUNG 3 - COUNTERFACTUAL</text>
  <text x="200" y="122" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">the road not taken</text>
  <text x="370" y="113" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">mediator weights</text>
  <text x="552" y="113" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">pathway M1/M2/M3</text>

  <!-- feed-forward arrows on the right: rung1 output -> rung2, rung2 -> rung3 -->
  <line x1="648" y1="232" x2="648" y2="210" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="648" y1="158" x2="648" y2="136" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="668" y="186" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 668 186)">output frames the rung above</text>

  <!-- caption -->
  <text x="32" y="312" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The bot never names the rungs to the rep. Rung-1 narration surfaces confounders, which frame the Rung-2 intervention question, whose</text>
  <text x="32" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">answer frames the Rung-3 counterfactual. The ladder is necessary in principle; elicitation QUALITY - resisting leading questions and</text>
  <text x="32" y="348" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">hallucinated structure - remains the open empirical question, which the downstream evidence gate is built to guard.</text>

  <!-- source line -->
  <text x="32" y="404" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: CH.08 THE CAUSAL INTERVIEW BOT</text>
</svg>
