  <!-- OUTPUT BOXES (right) -->
  <rect x="524" y="100" width="144" height="44" fill="#F5F5F5" stroke="#545454" stroke-width="1"/>
  <text x="596" y="119" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">COUNTERFACTUAL</text>
