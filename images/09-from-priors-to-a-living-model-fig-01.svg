<svg viewBox="0 0 700 420" role="img" aria-labelledby="fig-title-01" xmlns="http://www.w3.org/2000/svg">
  <title id="fig-title-01">Three ingredients converge into a structural causal model, which feeds two outputs</title>
  <desc>Three input boxes on the left - elicited structure, identified magnitudes, and physician history - each send an arrow into a larger central box, the structural causal model, drawn in red as the assembled object. The central box fans two arrows out to an upper output, the counterfactual engine, and a lower output, the drift monitor.</desc>
