  <!-- caption -->
  <text x="32" y="330" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Structure orients the edges, magnitude scales them, history supplies the</text>
  <text x="32" y="344" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">unit-level record. Together they parameterize one SCM, which drives both</text>
  <text x="32" y="358" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">the counterfactual engine and the drift monitor. The SCM stays auditable</text>
  <text x="32" y="372" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">through provenance tags on every edge [inferred labels].</text>

