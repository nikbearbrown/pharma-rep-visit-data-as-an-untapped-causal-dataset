  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- title -->
  <text x="32" y="34" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">Three ingredients assemble into one structural causal model</text>

  <!-- INPUT BOXES (left) -->
  <rect x="32" y="84" width="150" height="44" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="107" y="103" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">STRUCTURE</text>
  <text x="107" y="120" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">oriented prior DAG</text>

  <rect x="32" y="168" width="150" height="44" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="107" y="187" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">MAGNITUDE</text>
  <text x="107" y="204" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">IV / DiD estimates</text>

  <rect x="32" y="252" width="150" height="44" fill="#FFFFFF" stroke="#545454" stroke-width="1"/>
  <text x="107" y="271" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">HISTORY</text>
  <text x="107" y="288" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">physician panel</text>

  <!-- arrows into central SCM -->
  <line x1="182" y1="106" x2="300" y2="180" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="182" y1="190" x2="298" y2="190" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="182" y1="274" x2="300" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CENTRAL SCM BOX (enlarged, red emphasis) -->
  <rect x="304" y="142" width="112" height="96" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="360" y="184" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E">SCM</text>
  <text x="360" y="202" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">DAG + equations</text>
  <text x="360" y="218" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">+ provenance</text>

