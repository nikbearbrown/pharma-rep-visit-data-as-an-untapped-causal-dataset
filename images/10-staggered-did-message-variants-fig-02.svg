  <title id="fig-title-02">Two-estimator event-study overlay: naive TWFE vs Callaway-Sant'Anna</title>
  <desc>An event-study coefficient plot over relative event time with a visible zero line. The naive TWFE path (dashed gray) shows spurious sloping pre-trend leads and artificially negative early lags. The Callaway-Sant'Anna path (solid red) shows flat leads near zero and a positive growing staircase of lags that recovers the planted synthetic ground truth shown as a gray reference line. Shapes are illustrative; magnitudes are inferred.</desc>
