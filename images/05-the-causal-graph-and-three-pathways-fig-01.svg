<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">Three-pathway mediation graph: message variant fans into three correlated mediators</title>
  <desc>Cohort timing Z to message variant D; D fans into three mediators -- educational attitude (M1), samples and co-pay support (M2), reciprocity from sponsored meals (M3) -- which fan back into NRx (Y). Meals enter M3 from an external Open Payments public-data source, not from D. Tiers are shown grayscale-distinct: permissive (ink), cautionary (gray), high-scrutiny (red).</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Pharma Rep Visit Data as an Untapped Causal Dataset" book-slug="pharma-rep-visit-data-as-an-untapped-causal-dataset" chapter="05-the-causal-graph-and-three-pathways" figure-number="01" figure-title="Three-pathway mediation graph with regulatory color" figure-slug="three-pathway-mediation-graph" figure-type="DAG" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/05-the-causal-graph-and-three-pathways.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
    <marker id="arrowred" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#C8102E"/></marker>
  </defs>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="28" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">One treatment, three correlated pathways into the same outcome</text>
  <text x="32" y="46" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Meals enter reciprocity from public Open Payments data, not from D</text>

  <!-- Z node -->
  <rect x="40" y="186" width="86" height="48" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="83" y="208" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">cohort</text>
  <text x="83" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">timing (Z)</text>

  <!-- D node -->
  <rect x="170" y="186" width="92" height="48" fill="#F5F5F5" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="216" y="208" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">message</text>
  <text x="216" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">variant (D)</text>

  <!-- Three mediators (stacked). M1 top ink, M2 middle gray, M3 bottom red -->
  <!-- M1 educational -->
  <rect x="330" y="78" width="124" height="46" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="392" y="100" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">educational</text>
  <text x="392" y="116" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">attitude (M1)</text>

  <!-- M2 relationship -->
  <rect x="330" y="187" width="124" height="46" fill="#FFFFFF" stroke="#787878" stroke-width="1.5"/>
  <text x="392" y="209" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">samples /</text>
  <text x="392" y="225" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">co-pay (M2)</text>

  <!-- M3 reciprocity -->
  <rect x="330" y="296" width="124" height="46" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="392" y="318" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">reciprocity</text>
  <text x="392" y="334" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">meals (M3)</text>

  <!-- Y outcome -->
  <rect x="566" y="186" width="86" height="48" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="609" y="216" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">NRx (Y)</text>

  <!-- External Open Payments source (public data), lower-left, feeds M3 only -->
  <rect x="170" y="328" width="120" height="44" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="230" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">Open Payments</text>
  <text x="230" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">(public source)</text>

  <!-- Z -> D -->
  <line x1="126" y1="210" x2="162" y2="210" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- D fans out to M1, M2, M3 -->
  <line x1="262" y1="200" x2="322" y2="110" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="262" y1="210" x2="322" y2="210" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- NOTE: no D -> M3 arrow; M3 is fed by Open Payments only (chapter-specific asymmetry) -->

  <!-- Open Payments -> M3 -->
  <line x1="290" y1="338" x2="322" y2="324" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- M1, M2, M3 fan in to Y -->
  <line x1="454" y1="110" x2="566" y2="200" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="454" y1="210" x2="562" y2="210" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="454" y1="320" x2="566" y2="222" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrowred)"/>

  <!-- tier legend (grayscale-distinct + one red; never red-green) -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">
    <rect x="40" y="376" width="14" height="12" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
    <text x="58" y="386">permissive (M1)</text>
    <rect x="180" y="376" width="14" height="12" fill="#FFFFFF" stroke="#787878" stroke-width="1.5"/>
    <text x="198" y="386">cautionary (M2)</text>
    <rect x="320" y="376" width="14" height="12" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
    <text x="338" y="386">high-scrutiny (M3)</text>
  </g>

  <!-- caption: honesty -->
  <text x="32" y="408" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The per-pathway split is generally NOT point-identified: any defensible</text>
  <text x="32" y="422" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">decomposition reports interventional effects, not naive coefficient products.</text>
  <text x="32" y="436" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Public + synthetic only.</text>
</svg>
