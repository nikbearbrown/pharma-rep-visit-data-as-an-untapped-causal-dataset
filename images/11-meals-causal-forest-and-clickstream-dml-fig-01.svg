<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">Predictive forest versus causal forest</title>
  <desc>A two-column comparison. The left column shows a standard predictive forest: one data block uses all data for both splitting and leaf estimation, ending in a predicted-outcome node. The right column shows a causal forest: the data splits into two disjoint subsamples, one to decide split locations and one to estimate the effect inside each leaf (honest splitting), ending in a per-unit treatment-effect node with a confidence whisker. Centerline markers align the two on estimand, splitting discipline, and inference validity.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Pharma Rep Visit Data as an Untapped Causal Dataset" book-slug="pharma-rep-visit-data-as-an-untapped-causal-dataset" chapter="11-meals-causal-forest-and-clickstream-dml" figure-number="01" figure-title="Predictive forest versus causal forest" figure-slug="predictive-vs-causal-forest" figure-type="Comparison diagram" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/11-meals-causal-forest-and-clickstream-dml.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>
  <rect x="0" y="0" width="700" height="500" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="28" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">A causal forest is a predictive forest that learned to behave</text>
  <text x="32" y="46" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Same ensemble machinery, different estimand and an honest-splitting discipline</text>

  <!-- Column headers -->
  <text x="170" y="76" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Predictive forest</text>
  <text x="530" y="76" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">Causal forest</text>

  <!-- Centerline divider (gapped to clear contrast labels) -->
  <line x1="350" y1="64" x2="350" y2="162" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="350" y1="190" x2="350" y2="210" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="350" y1="238" x2="350" y2="282" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="5 4"/>
  <line x1="350" y1="310" x2="350" y2="356" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- LEFT column: data -> ensemble (all data both jobs) -> outcome -->
  <rect x="110" y="92" width="120" height="36" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="170" y="114" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">all data</text>
  <line x1="170" y1="128" x2="170" y2="160" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="178" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">split + estimate</text>
  <rect x="110" y="164" width="120" height="48" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="170" y="184" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">tree ensemble</text>
  <text x="170" y="200" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">(same rows for both)</text>
  <line x1="170" y1="212" x2="170" y2="244" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="110" y="248" width="120" height="44" fill="#FFFFFF" stroke="#787878" stroke-width="1.5"/>
  <text x="170" y="270" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">predicted</text>
  <text x="170" y="284" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">outcome E[Y|X]</text>

  <!-- RIGHT column: data -> fork into two disjoint subsamples -> ensemble -> effect node -->
  <rect x="470" y="92" width="120" height="36" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="530" y="114" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">data</text>
  <!-- fork -->
  <line x1="530" y1="128" x2="530" y2="138" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="452" y1="138" x2="608" y2="138" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="452" y1="138" x2="452" y2="156" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="608" y1="138" x2="608" y2="156" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="404" y="160" width="96" height="42" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="452" y="178" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">subsample 1</text>
  <text x="452" y="192" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">where to split</text>
  <rect x="560" y="160" width="96" height="42" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="608" y="178" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#2a1a0e">subsample 2</text>
  <text x="608" y="192" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">estimate leaf</text>
  <text x="530" y="216" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">honest splitting: disjoint rows</text>
  <!-- converge to ensemble -->
  <line x1="452" y1="202" x2="452" y2="222" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="608" y1="202" x2="608" y2="222" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="452" y1="222" x2="608" y2="222" stroke="#2a1a0e" stroke-width="1.5"/>
  <line x1="530" y1="222" x2="530" y2="234" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="470" y="238" width="120" height="36" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="530" y="260" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">tree ensemble</text>
  <line x1="530" y1="274" x2="530" y2="294" stroke="#2a1a0e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="470" y="298" width="120" height="46" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="530" y="318" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">per-unit effect</text>
  <text x="530" y="332" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">tau(x), with CI</text>
  <!-- CI whisker on effect node -->
  <line x1="530" y1="344" x2="530" y2="352" stroke="#C8102E" stroke-width="1"/>
  <line x1="522" y1="352" x2="538" y2="352" stroke="#C8102E" stroke-width="1"/>

  <!-- Centerline contrast markers -->
  <circle cx="350" cy="184" r="4" fill="#2a1a0e"/>
  <text x="350" y="176" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">estimand differs</text>
  <circle cx="350" cy="232" r="4" fill="#2a1a0e"/>
  <text x="350" y="224" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">splitting discipline</text>
  <circle cx="350" cy="304" r="4" fill="#2a1a0e"/>
  <text x="350" y="296" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">inference validity</text>

  <!-- Caption -->
  <text x="32" y="392" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The predictive forest reuses the same rows to choose splits and fill leaves, which invalidates inference</text>
  <text x="32" y="407" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">on effects. The causal forest's honest split (disjoint subsamples) is what licenses valid pointwise</text>
  <text x="32" y="422" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">confidence intervals on tau(x) (Wager and Athey, 2018).</text>
  <text x="32" y="437" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">This is Project 2 (meals): public-data-runnable on CMS Open Payments and Medicare Part D.</text>
  <text x="32" y="466" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">SOURCE: CAUSAL FOREST MECHANICS AS DESCRIBED IN CHAPTER 11</text>
</svg>
