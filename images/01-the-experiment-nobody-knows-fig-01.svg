<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">Single rep-visit trace as a behavioral timeline, then stacked longitudinally</title>
  <desc>A single sales-call session shown as a row of slide-view blocks, width by dwell time, colored by reaction; one skip and one back-track. Below, the same physician stacked across six months as one longitudinal series.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Pharma Rep Visit Data as an Untapped Causal Dataset" book-slug="pharma-rep-visit-data-as-an-untapped-causal-dataset" chapter="01-the-experiment-nobody-knows" figure-number="01" figure-title="Single rep-visit trace as a behavioral timeline, then stacked longitudinally" figure-slug="single-trace-then-stacked-longitudinal" figure-type="timeline / small-multiple stack" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/01-the-experiment-nobody-knows.md"/></metadata>
