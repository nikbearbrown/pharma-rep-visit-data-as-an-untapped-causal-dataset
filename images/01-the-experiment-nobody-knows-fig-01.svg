  <line x1="72" y1="62" x2="72" y2="362" stroke="#2a1a0e" stroke-width="1.5"/>

  <!-- anchor row: thicker / primary. blocks vary by dwell width, colored by reaction -->
  <!-- positive #C8102E is reserved as the ONE highlighted series; reactions use ink/grays per palette (max two data colors). Positive = red highlight, negative = dark ink, neutral = mid gray, skipped = light gray -->
  <g>
    <rect x="72" y="68" width="64" height="30" fill="#787878" stroke="#2a1a0e" stroke-width="1.5"/>
    <rect x="136" y="68" width="110" height="30" fill="#C8102E" stroke="#2a1a0e" stroke-width="1.5"/>
    <rect x="246" y="68" width="40" height="30" fill="#2a1a0e" stroke="#2a1a0e" stroke-width="1.5"/>
    <!-- skipped slide: thin light-gray marker / gap -->
