  <!-- layer 1 -->
  <circle cx="110" cy="130" r="16" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>
  <circle cx="110" cy="250" r="16" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>
  <!-- layer 2 -->
  <circle cx="240" cy="130" r="16" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>
  <circle cx="240" cy="250" r="16" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>
  <!-- layer 3 -->
  <circle cx="368" cy="130" r="16" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>
  <circle cx="368" cy="250" r="16" fill="#FFFFFF" stroke="#545454" stroke-width="1.5"/>

  <!-- LEGEND box -->
  <rect x="476" y="80" width="192" height="120" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="488" y="100" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e">EDGE TYPES</text>
  <!-- compelled sample -->
  <line x1="488" y1="126" x2="528" y2="126" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="123" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">compelled</text>
  <text x="540" y="137" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">(data settled)</text>
