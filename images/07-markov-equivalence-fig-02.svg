  <line x1="488" y1="166" x2="528" y2="166" stroke="#C8102E" stroke-width="1.5"/>
  <text x="540" y="163" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E">reversible</text>
