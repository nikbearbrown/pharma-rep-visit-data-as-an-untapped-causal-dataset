<svg viewBox="0 0 700 420" role="img" aria-labelledby="fig-title-02" xmlns="http://www.w3.org/2000/svg">
  <title id="fig-title-02">A CPDAG: directed compelled edges in black, undirected reversible edges in red</title>
  <desc>A six-node completed partially directed acyclic graph. Some edges are directed with black arrowheads - these are compelled, pointing the same way in every member of the equivalence class. Others are plain red line segments with no arrowhead - these are reversible, edges the data leaves open for an expert to orient.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Pharma Rep Visit Data as an Untapped Causal Dataset" book-slug="pharma-rep-visit-data-as-an-untapped-causal-dataset" chapter="07-markov-equivalence" figure-number="02" figure-title="The CPDAG two-color map (compelled vs reversible edges)" figure-slug="cpdag-two-color-map" figure-type="Systems diagram" priority="Critical" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/07-markov-equivalence.md"/></metadata>
