    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- title -->
  <text x="32" y="34" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The CPDAG: what the data has settled, and what it leaves open</text>

  <!-- plot area -->
  <rect x="32" y="56" width="420" height="280" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- layered layout: 3 layers, 2 nodes each. Layer x = 110, 240, 374 ; rows y = 130, 250 -->
  <!-- EDGES first (drawn under nodes) -->
  <!-- Compelled (directed, black): n1->n3, n2->n3, n3->n5 -->
  <line x1="128" y1="138" x2="216" y2="234" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="124" y1="256" x2="216" y2="252" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="258" y1="244" x2="350" y2="148" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Reversible (undirected, red plain segments, no arrowhead): n3-n4(=n5? ) define: n4 upper-right, n6 lower-right -->
  <line x1="258" y1="130" x2="350" y2="130" stroke="#C8102E" stroke-width="1.5"/>
  <line x1="258" y1="256" x2="350" y2="256" stroke="#C8102E" stroke-width="1.5"/>
  <line x1="368" y1="148" x2="368" y2="234" stroke="#C8102E" stroke-width="1.5"/>

