  <!-- caption -->
  <text x="32" y="356" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Black edges are compelled - identical across every graph in the Markov-</text>
  <text x="32" y="370" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">equivalence class. Red segments are reversible: the data is silent on their</text>
  <text x="32" y="384" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">direction. The CPDAG names the whole class at once (Verma-Pearl); rep</text>
  <text x="32" y="398" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">knowledge is what orients the red edges.</text>

