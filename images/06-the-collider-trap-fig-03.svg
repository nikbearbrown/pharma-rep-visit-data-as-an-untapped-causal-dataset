<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">Consent is a selection collider: analyzing the consenting subsample conditions on S</title>
  <desc>A treatment-side cause, rep engagement and visit frequency, and an outcome-side cause, industry-skepticism and prescribing propensity, both point into a central consent node S equals 1. The observed sample is only the consenting physicians, so analyzing it conditions on S and opens a spurious message-to-NRx path, exactly as conditioning on any collider does. The bias lives in who is absent from the data.</desc>
  <metadata><cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Pharma Rep Visit Data as an Untapped Causal Dataset" chapter="06-the-collider-trap" figure-number="03" figure-title="Consent as a selection collider" figure-type="selection-collider DAG" author="Nik Bear Brown" date-generated="2026-06-16" source-file="chapters/06-the-collider-trap.md"/></metadata>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
    <marker id="arrowred" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#C8102E"/></marker>
  </defs>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="32" y="30" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="14" fill="#2a1a0e">The selection collider is invisible in the data -- it lives in who is absent</text>
  <text x="32" y="50" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#545454">Consent is a common effect of treatment-side and outcome-side causes</text>

  <!-- Treatment-side cause (left) -->
  <rect x="40" y="110" width="180" height="56" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="130" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">rep engagement /</text>
  <text x="130" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">visit frequency</text>
  <text x="130" y="102" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="middle">treatment-side</text>

  <!-- Outcome-side cause (right) -->
  <rect x="480" y="110" width="180" height="56" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="570" y="132" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">industry-skepticism /</text>
  <text x="570" y="148" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" text-anchor="middle">prescribing propensity</text>
  <text x="570" y="102" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454" text-anchor="middle">outcome-side</text>

  <!-- Consent selection node (center, red box to flag the collider being conditioned) -->
  <rect x="290" y="200" width="120" height="56" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <rect x="282" y="192" width="136" height="72" fill="none" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="350" y="224" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">consent</text>
  <text x="350" y="240" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" text-anchor="middle">(S = 1)</text>

  <!-- arrows into S from both sides -->
  <line x1="200" y1="160" x2="294" y2="206" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="160" x2="406" y2="206" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- observed sample label below S -->
  <text x="350" y="294" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" text-anchor="middle">observed sample = only S = 1 physicians (opt-ins)</text>

  <!-- spurious induced path between the two causes (red dashed), the collider bias -->
  <path d="M 220 138 Q 350 176 480 138" fill="none" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowred)"/>
  <rect x="300" y="160" width="100" height="15" fill="#FFFFFF"/>
  <text x="350" y="171" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" text-anchor="middle">spurious path</text>

  <!-- caption: honesty -->
  <text x="32" y="332" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Analyzing the consenting subsample conditions on S, opening a spurious message-to-NRx path -- a</text>
  <text x="32" y="348" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Berkson / selection collider. No diagnostic on the observed data reveals it, so causal discovery must use</text>
  <text x="32" y="364" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">FCI (latent + selection), not PC or GES. Inferred relationship; Veeva field names dated mid-2026.</text>
  <text x="32" y="388" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">PUBLIC / SYNTHETIC ONLY</text>
</svg>
