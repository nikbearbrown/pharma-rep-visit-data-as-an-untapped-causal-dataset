<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Figure 10.2 — Two-estimator event-study overlay (TWFE vs Callaway-Sant'Anna)</title>
<style>
:root{
  --color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;--color-secondary:#545454;
  --color-border:#D4D4D4;--color-ochre:#C8860E;--color-fill:#F5F5F5;
  --font-title:'EB Garamond','Garamond',Georgia,serif;
  --font-body:'Inter',-apple-system,'Helvetica Neue',sans-serif;
  --font-mono:'JetBrains Mono','Fira Code','Courier New',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;--color-secondary:#A0978C;
  --color-border:#2E2E2E;--color-ochre:#D49A30;--color-fill:#1A1A1A;}}
*{box-sizing:border-box}
body{margin:0;background:var(--color-white);color:var(--color-ink);font-family:var(--font-body)}
#wrap{width:100%;max-width:760px;margin:0 auto}
svg{width:100%;height:auto;display:block}
.fig-title{font-family:var(--font-title);font-size:14px;fill:var(--color-ink)}
.fig-sub{font-family:var(--font-body);font-size:12px;fill:var(--color-secondary)}
.tick-label{font-family:var(--font-mono);font-size:11px;fill:var(--color-secondary)}
.axis-label{font-family:var(--font-body);font-size:11px;fill:var(--color-secondary)}
.caption{font-family:var(--font-body);font-size:11px;fill:var(--color-secondary)}
.source{font-family:var(--font-body);font-size:10px;fill:var(--color-secondary);letter-spacing:.08em}
.legend{font-family:var(--font-body);font-size:11px;fill:var(--color-secondary)}
.tooltip{position:absolute;pointer-events:none;background:var(--color-white);border:1px solid var(--color-border);
  padding:6px 8px;font-family:var(--font-body);font-size:11px;color:var(--color-ink);opacity:0;transition:opacity 120ms cubic-bezier(0.2,0.8,0.2,1)}
.pt{cursor:pointer}
.pt:focus{outline:2px solid var(--color-ochre)}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div id="wrap"></div>
<div class="tooltip" id="tt"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA = {
  reltime: [-4,-3,-1,1,3,5],
  twfe:    [0.30,0.18,0.26,-0.32,-0.06,0.40],
  cs:      [0.02,-0.02,0.04,0.42,0.72,0.86],
  truth:   0.80
};
const data = FALLBACK_DATA;
const W=760,H=460,margin={top:48,right:40,bottom:56,left:64};
const wrap=d3.select("#wrap");
const svg=wrap.append("svg").attr("viewBox",`0 0 ${W} ${H}`)
  .attr("role","img").attr("aria-labelledby","chart-title chart-desc");
svg.append("title").attr("id","chart-title").text("Two-estimator event-study overlay: naive TWFE vs Callaway-Sant'Anna");
svg.append("desc").attr("id","chart-desc").text("Event-study coefficients over relative event time around a visible zero line. The naive TWFE path shows spurious pre-trend leads and artificially negative early lags; the Callaway-Sant'Anna path keeps leads flat and recovers the planted ground truth. Shapes illustrative; magnitudes inferred.");
svg.append("rect").attr("x",0).attr("y",0).attr("width",W).attr("height",H).attr("fill","var(--color-white)");
svg.append("text").attr("class","fig-title").attr("x",32).attr("y",28).text("Same data, two estimators: only the clean one recovers the truth");
svg.append("text").attr("class","fig-sub").attr("x",32).attr("y",46).text("Not a zero-baseline bar chart; coefficients are signed around a visible zero line");

const tt=d3.select("#tt");

function draw(){
  svg.selectAll(".dyn").remove();
  const g=svg.append("g").attr("class","dyn");
  const plotW=W-margin.left-margin.right, plotH=H-margin.top-margin.bottom-40;
  const x=d3.scalePoint().domain(data.reltime).range([margin.left,W-margin.right]).padding(0.5);
  const allv=data.twfe.concat(data.cs).concat([data.truth]);
  const y=d3.scaleLinear().domain([d3.min(allv)-0.15,d3.max(allv)+0.15]).range([margin.top+plotH,margin.top]);
  g.append("rect").attr("x",margin.left).attr("y",margin.top).attr("width",plotW).attr("height",plotH)
    .attr("fill","var(--color-fill)").attr("stroke","var(--color-border)").attr("stroke-width",0.75);
  // zero line
  g.append("line").attr("aria-hidden","true").attr("x1",margin.left).attr("x2",W-margin.right)
    .attr("y1",y(0)).attr("y2",y(0)).attr("stroke","var(--color-ink)").attr("stroke-width",1);
  g.append("text").attr("class","tick-label").attr("x",margin.left-8).attr("y",y(0)+4).attr("text-anchor","end").text("0");
  // truth line
  g.append("line").attr("aria-hidden","true").attr("x1",x(1)).attr("x2",W-margin.right).attr("y1",y(data.truth)).attr("y2",y(data.truth))
    .attr("stroke","var(--color-secondary)").attr("stroke-width",0.75).attr("stroke-dasharray","5 4");
  g.append("text").attr("class","tick-label").attr("x",W-margin.right-4).attr("y",y(data.truth)-6).attr("text-anchor","end").text("planted truth");
  // onset line at relative time 0 (between -1 and 1) — draw vertical guide at midpoint
  const onsetX=(x(-1)+x(1))/2;
  g.append("line").attr("aria-hidden","true").attr("x1",onsetX).attr("x2",onsetX).attr("y1",margin.top).attr("y2",margin.top+plotH)
    .attr("stroke","var(--color-secondary)").attr("stroke-width",0.75).attr("stroke-dasharray","5 4");
  // x ticks
  g.selectAll(".xt").data(data.reltime).join("text").attr("class","tick-label")
    .attr("x",d=>x(d)).attr("y",margin.top+plotH+18).attr("text-anchor","middle").text(d=>d);
  g.append("text").attr("class","axis-label").attr("x",margin.left+plotW/2).attr("y",margin.top+plotH+36).attr("text-anchor","middle").text("relative event time (pre to post)");
  // y axis label
  g.append("text").attr("class","axis-label").attr("transform",`rotate(-90 ${margin.left-44} ${margin.top+plotH/2})`)
    .attr("x",margin.left-44).attr("y",margin.top+plotH/2).attr("text-anchor","middle").text("ATT coefficient");
  const line=d3.line().x((d,i)=>x(data.reltime[i])).y(d=>y(d)).curve(d3.curveLinear);
  // TWFE dashed gray
  g.append("path").datum(data.twfe).attr("fill","none").attr("stroke","var(--color-secondary)")
    .attr("stroke-width",1.5).attr("stroke-dasharray","5 4").attr("d",line);
  // CS solid red
  g.append("path").datum(data.cs).attr("fill","none").attr("stroke","var(--color-red)").attr("stroke-width",1.5).attr("d",line);
  // points (interactive)
  const series=[{name:"naive TWFE (biased)",vals:data.twfe,color:"var(--color-secondary)"},
                {name:"Callaway-Sant'Anna (clean)",vals:data.cs,color:"var(--color-red)"}];
  series.forEach(s=>{
    g.selectAll(null).data(s.vals.map((v,i)=>({v,rt:data.reltime[i],name:s.name,color:s.color}))).join("rect")
      .attr("class","pt").attr("tabindex",0)
      .attr("aria-label",d=>`${d.name}, relative time ${d.rt}, coefficient ${d.v}`)
      .attr("x",d=>x(d.rt)-4).attr("y",d=>y(d.v)-4).attr("width",8).attr("height",8).attr("fill",d=>d.color)
      .on("mouseenter",(e,d)=>showTip(e,d)).on("mousemove",(e,d)=>showTip(e,d)).on("mouseleave",hideTip)
      .on("focus",(e,d)=>showTip(e,d)).on("blur",hideTip)
      .on("keydown",(e,d)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();showTip(e,d);}});
  });
  // legend
  g.append("line").attr("x1",margin.left).attr("x2",margin.left+32).attr("y1",margin.top+plotH+52).attr("y2",margin.top+plotH+52)
    .attr("stroke","var(--color-secondary)").attr("stroke-width",1.5).attr("stroke-dasharray","5 4");
  g.append("text").attr("class","legend").attr("x",margin.left+40).attr("y",margin.top+plotH+56).text("naive TWFE (biased)");
  g.append("line").attr("x1",margin.left+260).attr("x2",margin.left+292).attr("y1",margin.top+plotH+52).attr("y2",margin.top+plotH+52)
    .attr("stroke","var(--color-red)").attr("stroke-width",1.5);
  g.append("text").attr("class","legend").attr("x",margin.left+300).attr("y",margin.top+plotH+56).text("Callaway-Sant'Anna (clean)");
  // caption + source
  g.append("text").attr("class","caption").attr("x",32).attr("y",H-26).text("TWFE invents pre-trends and pushes early lags below zero; the clean estimator recovers the planted effect. Magnitudes [inferred].");
  g.append("text").attr("class","caption").attr("x",32).attr("y",H-12).text("Naive TWFE with staggered adoption is biased (Goodman-Bacon negative weights); believe nothing before the falsification test.");
  g.append("text").attr("class","source").attr("x",32).attr("y",H-1).text("SOURCE: ILLUSTRATIVE EVENT-STUDY SHAPES AS DESCRIBED IN CHAPTER 10");
}
function showTip(e,d){tt.style("opacity",1).html(`<strong>${d.name}</strong><br>rel. time ${d.rt} &middot; coef ${d.v}`)
  .style("left",(e.pageX+12)+"px").style("top",(e.pageY-10)+"px");}
function hideTip(){tt.style("opacity",0);}
draw();
if(window.ResizeObserver){new ResizeObserver(()=>draw()).observe(document.getElementById("wrap"));}
</script>
</body>
</html>
