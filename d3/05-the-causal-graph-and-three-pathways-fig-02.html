<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Figure 5.2 — The assumption hierarchy</title>
<style>
  :root{
    --color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;--color-secondary:#545454;
    --color-border:#D4D4D4;--color-ochre:#C8860E;--color-fill:#F5F5F5;
  }
  @media (prefers-color-scheme: dark){
    :root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;--color-secondary:#A0978C;
      --color-border:#2E2E2E;--color-ochre:#D49A30;--color-fill:#1A1A1A;}
  }
  html,body{margin:0;padding:0;background:var(--color-white);color:var(--color-ink);}
  #wrap{width:100%;max-width:760px;margin:0 auto;}
  svg{width:100%;height:auto;display:block;}
  .title{font-family:'EB Garamond','Garamond',Georgia,serif;font-size:14px;fill:var(--color-ink);}
  .subtitle{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;fill:var(--color-secondary);}
  .lab{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;fill:var(--color-ink);font-weight:bold;}
  .sub{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .mono{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:11px;fill:var(--color-secondary);}
  .caption{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .tooltip{position:absolute;pointer-events:none;background:var(--color-white);border:1px solid var(--color-border);
    padding:4px 8px;font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;color:var(--color-ink);opacity:0;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="wrap"><div id="tip" class="tooltip"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
const FALLBACK_DATA=[
  {id:"total",lab:"Total Effect (IV estimate)",sub:"needs assumptions 1 and 3 -- secured by quasi-randomization",x:120,y:288,w:460,stroke:"var(--color-ink)",fill:"var(--color-fill)"},
  {id:"nde",lab:"Single-mediator NDE / NIE",sub:"needs all 4 assumptions -- incl. cross-world (NOT secured)",x:180,y:190,w:340,stroke:"#787878",fill:"var(--color-white)"},
  {id:"split",lab:"Three-mediator split",sub:"also needs no between-mediator confounding",x:240,y:92,w:220,stroke:"var(--color-red)",fill:"var(--color-white)"}
];
const W=700,H=420;
const wrap=d3.select("#wrap");const tip=d3.select("#tip");
function draw(){
  wrap.selectAll("svg").remove();
  const svg=wrap.append("svg").attr("viewBox",`0 0 ${W} ${H}`).attr("role","img").attr("aria-labelledby","chart-title chart-desc");
  svg.append("title").attr("id","chart-title").text("The assumption hierarchy: each higher claim rests on strictly more, untested assumptions");
  svg.append("desc").attr("id","chart-desc").text("Three stacked layers: total effect at bottom needs assumptions 1 and 3; single-mediator NDE/NIE in the middle needs all four including cross-world; three-mediator split on top also needs no between-mediator confounding.");
  const defs=svg.append("defs");
  defs.append("marker").attr("id","arrow").attr("markerWidth",8).attr("markerHeight",6).attr("refX",7).attr("refY",3).attr("orient","auto").append("polygon").attr("points","0 0, 8 3, 0 6").attr("fill","var(--color-ink)");
  svg.append("rect").attr("x",0).attr("y",0).attr("width",W).attr("height",H).attr("fill","var(--color-white)");

  svg.append("text").attr("class","title").attr("x",32).attr("y",30).text("Each higher claim leans on strictly more -- and untested -- assumptions");
  svg.append("text").attr("class","subtitle").attr("x",32).attr("y",50).text("The total effect is far more credible than any pathway share");

  const g=svg.selectAll("g.layer").data(FALLBACK_DATA).join("g").attr("class","layer")
    .attr("tabindex",0).attr("aria-label",d=>d.lab+": "+d.sub);
  g.append("rect").attr("x",d=>d.x).attr("y",d=>d.y).attr("width",d=>d.w).attr("height",56).attr("rx",0)
    .attr("fill",d=>d.fill).attr("stroke",d=>d.stroke).attr("stroke-width",1.5)
    .on("mousemove",(e,d)=>show(e,d.lab)).on("mouseleave",hide)
    .on("focus",function(e,d){show2(this,d.lab)}).on("blur",hide);
  g.append("text").attr("class","lab").attr("x",d=>d.x+d.w/2).attr("y",d=>d.y+24).attr("text-anchor","middle").text(d=>d.lab);
  g.append("text").attr("class","sub").attr("x",d=>d.x+d.w/2).attr("y",d=>d.y+42).attr("text-anchor","middle").text(d=>d.sub);

  svg.append("line").attr("x1",350).attr("y1",288).attr("x2",350).attr("y2",250).attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");
  svg.append("line").attr("x1",350).attr("y1",190).attr("x2",350).attr("y2",152).attr("stroke","var(--color-ink)").attr("stroke-width",1.5).attr("marker-end","url(#arrow)");

  svg.append("text").attr("class","mono").attr("x",596).attr("y",320).text("most credible");
  svg.append("text").attr("class","mono").attr("x",596).attr("y",124).text("least credible");

  svg.append("text").attr("class","caption").attr("x",32).attr("y",372).text("Randomizing the message buys assumptions 1 and 3 (total effect). It does nothing for the cross-world");
  svg.append("text").attr("class","caption").attr("x",32).attr("y",388).text("assumption, so the per-pathway split is generally NOT point-identified -- report interventional effects.");
  svg.append("text").attr("class","caption").attr("x",32).attr("y",408).attr("font-size","10").attr("letter-spacing","0.08em").text("PUBLIC / SYNTHETIC ONLY");
}
function show(e,t){tip.style("opacity",1).html(t).style("left",(e.pageX+12)+"px").style("top",(e.pageY-10)+"px");}
function show2(node,t){const r=node.getBoundingClientRect();tip.style("opacity",1).html(t).style("left",(window.scrollX+r.left+r.width/2)+"px").style("top",(window.scrollY+r.top-24)+"px");}
function hide(){tip.style("opacity",0);}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById("wrap"));
</script>
</body>
</html>
