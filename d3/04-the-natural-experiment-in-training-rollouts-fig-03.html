<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Figure 4.3 — First-stage F vs actual test size</title>
<style>
  :root{
    --color-white:#FFFFFF;--color-ink:#2a1a0e;--color-red:#C8102E;--color-secondary:#545454;
    --color-border:#D4D4D4;--color-ochre:#C8860E;--color-fill:#F5F5F5;
  }
  @media (prefers-color-scheme: dark){
    :root{--color-white:#111111;--color-ink:#F0EBE3;--color-red:#E8243A;--color-secondary:#A0978C;
      --color-border:#2E2E2E;--color-ochre:#D49A30;--color-fill:#1A1A1A;}
  }
  html,body{margin:0;padding:0;background:var(--color-white);color:var(--color-ink);}
  #wrap{width:100%;max-width:760px;margin:0 auto;}
  svg{width:100%;height:auto;display:block;}
  .title{font-family:'EB Garamond','Garamond',Georgia,serif;font-size:14px;fill:var(--color-ink);}
  .subtitle{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;fill:var(--color-secondary);}
  .body{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-ink);}
  .axis{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:12px;fill:var(--color-secondary);}
  .tick{font-family:'JetBrains Mono','Fira Code','Courier New',monospace;font-size:11px;fill:var(--color-secondary);}
  .caption{font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;fill:var(--color-secondary);}
  .tooltip{position:absolute;pointer-events:none;background:var(--color-white);border:1px solid var(--color-border);
    padding:4px 8px;font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;font-size:11px;color:var(--color-ink);opacity:0;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="wrap"><div id="tip" class="tooltip"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// actual size of nominal 5% t-test as a function of first-stage F (illustrative curve)
function sizeAt(F){
  // descends from ~0.30 toward asymptote 0.05; hits ~0.05 near F=104.7
  const floor=0.05;
  return floor + 0.27*Math.exp(-(F-1)/26);
}
const FALLBACK_DATA = d3.range(1,201).map(F=>({F, size:sizeAt(F)}));
const W=700,H=480, margin={top:48,right:40,bottom:56,left:64};
const wrap=d3.select("#wrap");const tip=d3.select("#tip");
function draw(){
  wrap.selectAll("svg").remove();
  const svg=wrap.append("svg").attr("viewBox",`0 0 ${W} ${H}`).attr("role","img").attr("aria-labelledby","chart-title chart-desc");
  svg.append("title").attr("id","chart-title").text("First-stage F versus actual size of a nominal five-percent t-test");
  svg.append("desc").attr("id","chart-desc").text("A descending curve relating first-stage F from 1 to 200 to the true size of a nominal 5 percent t-test; the curve sits above 5 percent at F=10 and only meets the 5 percent line near F=104.7.");
  svg.append("rect").attr("x",0).attr("y",0).attr("width",W).attr("height",H).attr("fill","var(--color-white)");

  svg.append("text").attr("class","title").attr("x",32).attr("y",30).text("F greater than 10 does not buy a valid 5% test");
  svg.append("text").attr("class","subtitle").attr("x",32).attr("y",50).text("Actual test size only falls to 5% near F = 104.7, not at the legacy F = 10 rule");

  const x0=margin.left, x1=W-margin.right, y0=H-margin.bottom-56, y1=margin.top;
  // plot area
  svg.append("rect").attr("x",x0).attr("y",y1).attr("width",x1-x0).attr("height",y0-y1).attr("fill","var(--color-fill)").attr("stroke","var(--color-border)").attr("stroke-width",0.75);

  const x=d3.scaleLinear().domain([1,200]).range([x0,x1]);
  const y=d3.scaleLinear().domain([0,0.30]).range([y0,y1]); // zero baseline

  // axes
  svg.append("line").attr("x1",x0).attr("y1",y0).attr("x2",x1).attr("y2",y0).attr("stroke","var(--color-ink)").attr("stroke-width",1.5);
  svg.append("line").attr("x1",x0).attr("y1",y0).attr("x2",x0).attr("y2",y1).attr("stroke","var(--color-ink)").attr("stroke-width",1.5);

  [0,0.05,0.15,0.30].forEach(v=>{
    svg.append("text").attr("class","tick").attr("x",x0-6).attr("y",y(v)+4).attr("text-anchor","end").text(Math.round(v*100)+"%");
  });
  [[1,"1"],[10,"10"],[105,"105"],[200,"200"]].forEach(([v,l])=>{
    svg.append("text").attr("class","tick").attr("x",x(v)).attr("y",y0+18).attr("text-anchor","middle").text(l);
  });
  svg.append("text").attr("class","axis").attr("x",(x0+x1)/2).attr("y",y0+40).attr("text-anchor","middle").text("first-stage F statistic");

  // 5% reference
  svg.append("line").attr("x1",x0).attr("y1",y(0.05)).attr("x2",x1).attr("y2",y(0.05)).attr("stroke","var(--color-border)").attr("stroke-width",0.75).attr("stroke-dasharray","5 4").attr("aria-hidden","true");
  // vertical guides
  svg.append("line").attr("x1",x(10)).attr("y1",y0).attr("x2",x(10)).attr("y2",y1).attr("stroke","var(--color-border)").attr("stroke-width",0.75).attr("stroke-dasharray","5 4").attr("aria-hidden","true");
  svg.append("line").attr("x1",x(104.7)).attr("y1",y0).attr("x2",x(104.7)).attr("y2",y(0.05)).attr("stroke","var(--color-border)").attr("stroke-width",0.75).attr("stroke-dasharray","5 4").attr("aria-hidden","true");

  // data line
  const line=d3.line().x(d=>x(d.F)).y(d=>y(d.size)).curve(d3.curveMonotoneX);
  svg.append("path").datum(FALLBACK_DATA).attr("fill","none").attr("stroke","var(--color-red)").attr("stroke-width",1.5).attr("d",line);

  // emphasis dots
  [10,104.7].forEach(F=>{
    svg.append("circle").attr("cx",x(F)).attr("cy",y(sizeAt(F))).attr("r",3.5).attr("fill","var(--color-red)")
      .attr("tabindex",0).attr("aria-label",`F equals ${F}: actual size ${(sizeAt(F)*100).toFixed(1)} percent`)
      .on("mousemove",(e)=>show(e,`F = ${F}: size ${(sizeAt(F)*100).toFixed(1)}%`)).on("mouseleave",hide)
      .on("focus",function(){show2(this,`F = ${F}: size ${(sizeAt(F)*100).toFixed(1)}%`)}).on("blur",hide);
  });
  svg.append("text").attr("class","body").attr("x",x(10)+8).attr("y",y(sizeAt(10))-22).text("F = 10: true size well above 5%");
  svg.append("text").attr("class","body").attr("x",x(104.7)+10).attr("y",y(0.05)-11).text("F = 104.7: size finally hits 5%");

  svg.append("text").attr("class","caption").attr("x",32).attr("y",y0+72).text("The F > 10 rule is legacy; the modern bar is F = 104.7 (Lee, McCrary,");
  svg.append("text").attr("class","caption").attr("x",32).attr("y",y0+86).text("Moreira & Porter 2022). One curve shown; curvature illustrative. Public/synthetic.");
}
function show(e,t){tip.style("opacity",1).html(t).style("left",(e.pageX+12)+"px").style("top",(e.pageY-10)+"px");}
function show2(node,t){const r=node.getBoundingClientRect();tip.style("opacity",1).html(t).style("left",(window.scrollX+r.left+r.width/2)+"px").style("top",(window.scrollY+r.top-24)+"px");}
function hide(){tip.style("opacity",0);}
draw();
new ResizeObserver(()=>draw()).observe(document.getElementById("wrap"));
</script>
</body>
</html>
